---

- name: Download pgadmin key
  ansible.builtin.get_url:
    url: "https://www.pgadmin.org/static/packages_pgadmin_org.pub"
    dest: /etc/apt/keyrings/pgadmin.asc
    mode: "0644"
    force: false
  tags:
    - pgadmin4

- name: Dearmor pgadmin key
  ansible.builtin.command:
    cmd: gpg --dearmor --yes --output /etc/apt/keyrings/pgadmin.gpg /etc/apt/keyrings/pgadmin.asc
    creates: /etc/apt/keyrings/pgadmin.gpg
  tags:
    - pgadmin4

- name: Add pgadmin repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch=amd64 signed-by=/etc/apt/keyrings/pgadmin.gpg]
      https://ftp.postgresql.org/pub/pgadmin/pgadmin4/apt/{{ ansible_distribution_release }}
      pgadmin4 main
    filename: postgresql
    state: present
  tags:
    - pgadmin4

- name: Add 1password key
  ansible.builtin.get_url:
    url: https://downloads.1password.com/linux/keys/1password.asc
    dest: /etc/apt/keyrings/1password.asc
    mode: "0644"
    force: false
  tags:
    - 1password

- name: Dearmor 1password key
  ansible.builtin.command:
    cmd: gpg --dearmor --yes --output /etc/apt/keyrings/1password-archive-keyring.gpg /etc/apt/keyrings/1password.asc
    creates: /etc/apt/keyrings/1password-archive-keyring.gpg
  tags:
    - 1password

- name: Add 1password repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch=amd64 signed-by=/etc/apt/keyrings/1password-archive-keyring.gpg]
      https://downloads.1password.com/linux/debian/amd64 stable main
    filename: 1password
    state: present
  tags:
    - 1password

- name: Ensure 1password debsig policy directory exists
  ansible.builtin.file:
    path: /etc/debsig/policies/AC2D62742012EA22
    state: directory
    mode: "0755"
  tags:
    - 1password

- name: Download 1password debsig policy
  ansible.builtin.get_url:
    url: https://downloads.1password.com/linux/debian/debsig/1password.pol
    dest: /etc/debsig/policies/AC2D62742012EA22/1password.pol
    mode: "0644"
  tags:
    - 1password

- name: Ensure 1password debsig key directory exists
  ansible.builtin.file:
    path: /usr/share/debsig/keyrings/AC2D62742012EA22
    state: directory
    mode: "0755"
  tags:
    - 1password

- name: Download 1password debsig key
  ansible.builtin.get_url:
    url: https://downloads.1password.com/linux/keys/1password.asc
    dest: /usr/share/debsig/keyrings/AC2D62742012EA22/debsig.asc
    mode: "0644"
    force: false
  tags:
    - 1password

- name: Add hashicorp key
  ansible.builtin.get_url:
    url: "https://apt.releases.hashicorp.com/gpg"
    dest: /etc/apt/keyrings/hashicorp.asc
    mode: "0644"
    force: false
  tags:
    - packer

- name: Dearmor hashicorp key
  ansible.builtin.command:
    cmd: gpg --dearmor --yes --output /etc/apt/keyrings/hashicorp.gpg /etc/apt/keyrings/hashicorp.asc
    creates: /etc/apt/keyrings/hashicorp.gpg
  tags:
    - packer

- name: Add hashicorp repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch=amd64 signed-by=/etc/apt/keyrings/hashicorp.gpg]
      https://apt.releases.hashicorp.com {{ ansible_distribution_release }} main
    filename: hashicorp
    state: present
  tags:
    - packer

- name: Add Sublime Text key
  ansible.builtin.get_url:
    url: "https://download.sublimetext.com/sublimehq-pub.gpg"
    dest: /etc/apt/keyrings/sublimehq-pub.gpg
    mode: "0644"
    force: false
  tags:
    - sublime-text

- name: Add Sublime Text repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch=amd64 signed-by=/etc/apt/keyrings/sublimehq-pub.gpg]
      https://download.sublimetext.com/ apt/stable/
    filename: sublime
    state: present
  tags:
    - sublime-text

- name: Add Docker key
  ansible.builtin.get_url:
    url: "https://download.docker.com/linux/{{ ansible_distribution | lower }}/gpg"
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"
    force: false
  tags:
    - docker

- name: Dearmor Docker key
  ansible.builtin.command:
    cmd: gpg --dearmor --yes --output /etc/apt/keyrings/docker.gpg /etc/apt/keyrings/docker.asc
    creates: /etc/apt/keyrings/docker.gpg
  tags:
    - docker

- name: Add Docker repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg]
      https://download.docker.com/linux/{{ ansible_distribution | lower }}
      {{ ansible_distribution_release }} stable
    filename: docker
    state: present
    update_cache: true
  tags:
    - docker

- name: Add Kubernetes key
  ansible.builtin.get_url:
    url: "https://pkgs.k8s.io/core:/stable:/v1.29/deb/Release.key"
    dest: /etc/apt/keyrings/kubernetes-apt-keyring.asc
    mode: "0644"
    force: false
  tags:
    - k8s

- name: Dearmor Kubernetes key
  ansible.builtin.command:
    cmd: gpg --dearmor --yes --output /etc/apt/keyrings/kubernetes-apt-keyring.gpg /etc/apt/keyrings/kubernetes-apt-keyring.asc
    creates: /etc/apt/keyrings/kubernetes-apt-keyring.gpg
  tags:
    - k8s

- name: Add Kubernetes repository
  ansible.builtin.apt_repository:
    repo: deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v1.29/deb/ /
    filename: kubernetes
    state: present
  tags:
    - k8s
