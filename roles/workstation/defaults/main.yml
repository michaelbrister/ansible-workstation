---
# Role defaults
workstation_user: "{{ ansible_user_id | default(lookup('env', 'USER')) }}"

# Safety switches
workstation_apt_full_upgrade: false

# Package groups
workstation_apt_packages:
  - apt-transport-https
  - ca-certificates
  - software-properties-common
  - git
  - curl
  - tree
  - neovim
  - net-tools
  - python3-neovim
  - python3-pip
  - openvpn-systemd-resolved
  - remmina
  - flameshot
  - htop
  - nload
  - virtualbox
  - direnv
  - build-essential
  - tmux
  - tmate
  - fonts-powerline
  - xclip
  - openjdk-17-jdk-headless
  - nmap
  - nodejs
  - httping
  - dnsutils
  - zsh
  - xsel
  - nala

workstation_pip_packages:
  - ansible==2.10.4
  - ansible-base==2.10.4
  - awscli==1.18.198
  - boto
  - boto3
  - slackpy

workstation_npm_packages:
  - serverless

workstation_snap_packages:
  - intellij-idea-community
  - slack
  - yq

# Tool versions and install paths
workstation__golang_download_location: https://golang.org/dl/
workstation__golang_arch: amd64
workstation__golang_version: go1.26.1
workstation__golang_file: "{{ workstation__golang_version }}.linux-{{ workstation__golang_arch }}.tar.gz"
workstation__golang_url: https://golang.org/dl/{{ workstation__golang_file }}
workstation__golang_install_directory: /usr/local
